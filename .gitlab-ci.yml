image: python:3.14-alpine

stages:
  - validate
  - test

variables:
  BROWSER: chrome
  FF_NETWORK_PER_BUILD: "1"
  SELENIUM_REMOTE_URL: "http://selenium:4444"
  TEST_ARTIFACTS_DIR: test-artifacts

.job_template:
  before_script:
    - pip3 install -r requirements.txt

validate:
  extends: .job_template
  stage: validate
  script:
    - python -m py_compile __init__.py conftest.py scripts/wait_for_selenium.py tests/test_google.py
    - pytest --collect-only -q

.e2e_template:
  extends: .job_template
  stage: test
  script:
    - mkdir -p reports "$TEST_ARTIFACTS_DIR"
    - python scripts/wait_for_selenium.py --url "$SELENIUM_REMOTE_URL" --timeout 60
    - pytest --browser=$BROWSER --local='false' --junitxml=reports/junit.xml
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit: reports/junit.xml
    paths:
      - reports/
      - test-artifacts/

e2e:remote:chrome:
  extends: .e2e_template
  services:
    # - name: selenium/standalone-chrome:latest
    - name: selenium/standalone-chromium:latest
      alias: selenium
  rules:
    - if: '$BROWSER == "chrome"'

e2e:remote:firefox:
  extends: .e2e_template
  services:
    - name: selenium/standalone-firefox:latest
      alias: selenium
  rules:
    - if: '$BROWSER == "firefox"'
